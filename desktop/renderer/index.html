<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Seek Apply Assistant</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>Seek Apply Assistant</h1>
      <p>Configure your job search, run the assistant, and stop anytime.</p>
    </section>

    <section class="card">
      <h2>Login</h2>

      <label>Email</label>
      <input id="email" type="email" placeholder="you@email.com" />

      <label>Password</label>
      <input id="password" type="password" placeholder="Seek password" />
    </section>

    <section class="card">
      <h2>Job Search Settings</h2>

      <label>Keywords</label>
      <input id="keywords" placeholder="frontend developer, react, vue" />

      <label>Location</label>
      <input id="location" placeholder="Brisbane, Gold Coast, Remote" />

      <label>Maximum applications per run</label>
      <input id="maxApplications" type="number" value="10" />

      <label>
        <input id="reviewBeforeApply" type="checkbox" checked />
        Review before applying
      </label>
    </section>

    <section class="card">
      <h2>Documents</h2>

      <button id="selectResume">Choose Resume</button>
      <p id="resumePath">No resume selected</p>

      <button id="selectCoverLetter">Choose Cover Letter</button>
      <p id="coverLetterPath">No cover letter selected</p>
    </section>

    <section class="actions">
      <button id="saveConfig">Save Config</button>
      <button id="start" class="primary">Start</button>
      <button id="stop" class="danger">Stop</button>
      <button id="clearApplied">Clear Applied History</button>
    </section>

    <section class="card">
      <h2>Live Logs</h2>
      <pre id="logs"></pre>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
