<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Seek Apply Assistant</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>Seek Apply Assistant</h1>
      <p>Configure your job search, run the assistant, and stop anytime.</p>
    </section>

    <section class="card">
      <h2>Login</h2>

      <label>Email</label>
      <input id="email" type="email" placeholder="you@email.com" />

      <label>Password</label>
      <input id="password" type="password" placeholder="Seek password" />
    </section>

    <section class="card">
      <h2>Job Search Settings</h2>

      <label>Keywords</label>
      <input id="keywords" placeholder="frontend developer, react, vue" />

      <label>Location</label>
      <input id="location" placeholder="Brisbane, Gold Coast, Remote" />

      <label>Maximum applications per run</label>
      <input id="maxApplications" type="number" value="10" />

      <label>
        <input id="reviewBeforeApply" type="checkbox" checked />
        Review before applying
      </label>
    </section>

    <section class="card">
      <h2>Documents</h2>

      <button id="selectResume">Choose Resume</button>
      <p id="resumePath">No resume selected</p>

      <button id="selectCoverLetter">Choose Cover Letter</button>
      <p id="coverLetterPath">No cover letter selected</p>
    </section>

    <section class="card">
      <h2>AI Settings</h2>

      <label>AI Mode</label>
      <select id="aiMode">
        <option value="hosted">Use Built-in AI (limited daily usage)</option>
        <option value="byok">Use My Own API Key</option>
      </select>

      <div id="hostedSettings">
        <label>AI Quality</label>
        <select id="hostedModel">
          <option value="budget">Budget — cheapest, good for simple tasks</option>
          <option value="balanced">Balanced — better answers, slightly more usage</option>
          <option value="premium">Premium — best quality, uses more credits</option>
        </select>
        <p class="hint">Built-in AI is powered by budget models. Daily limits apply.</p>
      </div>

      <div id="byokSettings" style="display:none">
        <label>Provider</label>
        <select id="byokProvider">
          <option value="openrouter">OpenRouter</option>
          <option value="openai">OpenAI</option>
          <option value="gemini">Gemini</option>
          <option value="deepseek">DeepSeek</option>
          <option value="minimax">MiniMax</option>
        </select>

        <label>Model</label>
        <input id="byokModel" placeholder="deepseek/deepseek-chat" />

        <label>API Key</label>
        <div class="key-row">
          <input id="apiKeyInput" type="password" placeholder="sk-..." />
          <button id="toggleKeyVisibility" class="btn-sm">Show</button>
        </div>

        <div class="actions" style="margin-top:8px">
          <button id="testConnection">Test Connection</button>
          <button id="saveAISettings" class="primary">Save AI Settings</button>
        </div>
        <p id="aiStatus" class="hint"></p>
      </div>
    </section>

    <section class="actions">
      <button id="saveConfig">Save Config</button>
      <button id="start" class="primary">Start</button>
      <button id="stop" class="danger">Stop</button>
      <button id="clearApplied">Clear Applied History</button>
    </section>

    <section class="card">
      <h2>Live Logs</h2>
      <pre id="logs"></pre>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
